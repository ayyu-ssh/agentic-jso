services:
  - type: web
    name: agentic-jso-backend
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_KEY
        sync: false
      - key: SERP_DEV_API_KEY
        sync: false

services:
  - type: web
    name: agentic-jso-backend
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_KEY
        sync: false
      - key: SERP_DEV_API_KEY
        sync: false

  - type: web
    name: agentic-jso-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
